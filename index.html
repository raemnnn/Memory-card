<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Memory Card</title>
</head>
<body>
    <div class="main-menu-container">
        <div class="title">
            <h1>MEMORY CARD</h1>
        </div>

        <div class="buttons">
            <div class="start">
                <button onclick="location.href='game.html'">▶ Start Game</button>
            </div>
            <div class="options">
                <button onclick="location.href='options.html'">⚙ Options</button>
            </div>
            <div class="howtoplay">
                <button onclick="location.href='howtoplay.html'">❓ How to Play</button>
            </div>
            <div class="exit">
                <button onclick="location.href='exit.html'">✖ Exit</button>
            </div>
        </div>
    </div>

    <div class="score-combo">
        <div class="score">
            <h1>Score: 0</h1>
        </div>

        <div class="combo">
            <h1>Combo: 0</h1>
        </div>
    </div>
    
    <div class="game">
        <div class="game-container">
            <div class="grid">
                <div class="card">
                    <div class="card-back">
                        <h1>?</h1>
                    </div>
                </div>
                <div class="card">
                    <div class="card-back">
                        <h1>?</h1>
                    </div>
                </div>
                <div class="card">
                    <div class="card-back">
                        <h1>?</h1>
                    </div>
                </div>
                <div class="card">
                    <div class="card-back">
                        <h1>?</h1>
                    </div>
                </div>
                <div class="card">
                    <div class="card-back">
                        <h1>?</h1>
                    </div>
                </div>
                <div class="card">
                    <div class="card-back">
                        <h1>?</h1>
                    </div>
                </div>
                <div class="card">
                    <div class="card-back">
                        <h1>?</h1>
                    </div>
                </div>
                <div class="card">
                    <div class="card-back">
                        <h1>?</h1>
                    </div>
                </div>
                <div class="card">
                    <div class="card-back">
                        <h1>?</h1>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="game-over-container">
        <div class="text">
            <h1>GAME OVER</h1>
        </div>
        <div class="message">
            <p>You have lost the game.</p>
        </div>
        <div class="buttons">
            <button onclick="location.href='start.html'">Try Again</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
